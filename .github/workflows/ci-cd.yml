name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Lint (pokud existuje)
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "Lint script nenalezen, preskakuji"
          fi
      - name: Tests
        run: npm test

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASS }}
          script: |
            set -e
            SSH_CMD="ssh -i /root/.ssh/deploy_dagmarcom_backend -o IdentitiesOnly=yes"
            if [ ! -d /srv/hcasc/_repos/dagmarcom-backend/.git ]; then
              GIT_SSH_COMMAND="$SSH_CMD" git clone git@github.com:karelmartinek-a11y/dagmarcom-backend.git /srv/hcasc/_repos/dagmarcom-backend
            fi
            cd /srv/hcasc/_repos/dagmarcom-backend
            GIT_SSH_COMMAND="$SSH_CMD" git fetch origin main
            GIT_SSH_COMMAND="$SSH_CMD" git checkout main
            GIT_SSH_COMMAND="$SSH_CMD" git reset --hard origin/main
            DEPLOY_TAG=$(git rev-parse --short HEAD)
            rsync -a --delete --exclude='.git' --exclude='node_modules' --exclude='data' --exclude='logs' /srv/hcasc/_repos/dagmarcom-backend/ /opt/dagmarcom/backend/
            if [ -f /opt/dagmarcom/backend/.env ]; then
              if grep -q '^DAGMARCOM_DEPLOY_TAG=' /opt/dagmarcom/backend/.env; then
                sed -i "s/^DAGMARCOM_DEPLOY_TAG=.*/DAGMARCOM_DEPLOY_TAG=${DEPLOY_TAG}/" /opt/dagmarcom/backend/.env
              else
                echo "DAGMARCOM_DEPLOY_TAG=${DEPLOY_TAG}" >> /opt/dagmarcom/backend/.env
              fi
            else
              echo "DAGMARCOM_DEPLOY_TAG=${DEPLOY_TAG}" > /opt/dagmarcom/backend/.env
            fi
            cd /opt/dagmarcom/backend
            rm -rf node_modules
            npm ci
            /opt/dagmarcom/sandbox/run-tests.sh
            systemctl restart dagmarcom-backend.service
            mkdir -p /var/log/api-hcasc
            printf '%s DagmarCom backend: auto-deploy main\n' "$(date '+%F %T')" >> /var/log/api-hcasc/deploy.log
